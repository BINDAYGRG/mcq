<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM7403 | 150 Unique Deep Q&A</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- THEMES & VARIABLES --- */
        :root[data-theme="light"] {
            --bg-main: #f0f4f8; --bg-glass: rgba(255, 255, 255, 0.85); --bg-card: #ffffff;
            --primary: #4f46e5; --secondary: #0f172a;
            --text-main: #1e293b; --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.1); 
            --correct-bg: rgba(16, 185, 129, 0.1); --correct-border: #10b981; --correct-text: #059669;
            --wrong-bg: rgba(239, 68, 68, 0.05); --wrong-border: rgba(239, 68, 68, 0.3); --wrong-text: #dc2626;
        }
        :root[data-theme="dark"] {
            --bg-main: #0b0f19; --bg-glass: rgba(15, 23, 42, 0.85); --bg-card: #1e293b;
            --primary: #6366f1; --secondary: #f8fafc;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.5); 
            --correct-bg: rgba(52, 211, 153, 0.1); --correct-border: #34d399; --correct-text: #10b981;
            --wrong-bg: rgba(248, 113, 113, 0.05); --wrong-border: rgba(248, 113, 113, 0.3); --wrong-text: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }

        body { display: flex; height: 100vh; color: var(--text-main); overflow: hidden; background: var(--bg-main); background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent 50%), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 50%); }

        /* --- SIDEBAR --- */
        .sidebar { width: 320px; background: var(--bg-glass); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; z-index: 100; }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand h1 { font-size: 28px; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--correct-border)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2;}
        .brand span { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }

        .nav-menu { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .nav-menu::-webkit-scrollbar { width: 4px; }
        .nav-menu::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .nav-item { padding: 14px 20px; border-radius: 12px; color: var(--text-muted); font-weight: 600; cursor: pointer; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .nav-item:hover { background: rgba(99, 102, 241, 0.1); color: var(--primary); transform: translateX(5px); }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 10px 20px -10px var(--primary); font-weight: 700; }
        
        /* --- MAIN CONTENT --- */
        .main-wrapper { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; position: relative; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header-bar h2 { font-size: 32px; font-weight: 800; color: var(--secondary); }
        
        .controls { display: flex; gap: 15px; align-items: center; width: 100%; max-width: 600px;}
        .search-bar { flex: 1; padding: 14px 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); font-size: 16px; box-shadow: var(--shadow); outline: none; }
        .search-bar:focus { border-color: var(--primary); }
        .btn { background: var(--bg-card); color: var(--secondary); border: 1px solid var(--border); padding: 14px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow); }
        .btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .btn-active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- DEEP QA CARDS --- */
        .qa-list { display: flex; flex-direction: column; gap: 30px; max-width: 1000px; margin: 0 auto; }
        .qa-card { background: var(--bg-glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 20px; padding: 35px; box-shadow: var(--shadow); position: relative; }
        .qa-card:hover { border-color: var(--primary); }
        
        .qa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .qa-cat { background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .qa-num { color: var(--text-muted); font-weight: 800; font-size: 18px; }
        
        .qa-q { font-size: 24px; font-weight: 800; color: var(--secondary); margin-bottom: 25px; line-height: 1.5; }
        
        .btn-reveal { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-reveal:hover { filter: brightness(1.1); }
        .qa-card.revealed .btn-reveal { display: none; }

        .qa-options-container { display: none; flex-direction: column; gap: 15px; animation: slideDown 0.4s ease; }
        .qa-card.revealed .qa-options-container { display: flex; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Option Styling */
        .opt-box { border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: var(--bg-card); }
        .opt-box.is-correct { border-color: var(--correct-border); background: var(--correct-bg); }
        .opt-box.is-wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }

        .opt-header { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 700; color: var(--secondary); }
        .opt-letter { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; flex-shrink: 0; }
        
        .is-correct .opt-letter { background: var(--correct-border); color: white; }
        .is-wrong .opt-letter { background: var(--border); color: var(--text-muted); }
        .is-correct .opt-text { color: var(--correct-text); }
        .is-wrong .opt-text { color: var(--text-muted); text-decoration: line-through; opacity: 0.8;}

        .opt-explanation { font-size: 15px; line-height: 1.6; color: var(--text-main); padding-top: 10px; border-top: 1px dashed var(--border); margin-top: 5px; }
        .is-correct .opt-explanation { color: var(--correct-text); }
        .is-wrong .opt-explanation { color: var(--wrong-text); }

        .reveal-hint { display: none; color: var(--primary); font-weight: 700; font-size: 14px; margin-top: 10px; cursor: pointer; text-align: center; }
        .study-mode .reveal-hint { display: block; }
        .study-mode .qa-card { cursor: pointer; }
        .study-mode .qa-card.revealed .reveal-hint { display: none; }

        /* Mobile */
        .mobile-toggle { display: none; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { position: fixed; left: -100%; top: 0; height: 100%; transition: 0.4s; z-index: 200; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            .mobile-toggle { display: block; }
            .main-wrapper { padding: 20px; }
            .controls { flex-direction: column; width: 100%; align-items: stretch; }
            .header-bar { align-items: flex-start; }
            .qa-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">
            <h1>150 UNIQUE Q&A</h1>
            <span>BM7403 • Deep Vault</span>
        </div>
        
        <div class="nav-menu" id="navMenu">
            <div class="nav-item active" onclick="filterCat('All', this)">All Topics</div>

            <div class="nav-item" onclick="filterCat('Case', this)">Case Studies</div>
        </div>
    </div>

    <div class="main-wrapper" id="mainWrapper">
        <div class="header-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>
                <h2 id="pageTitle">All Topics</h2>
            </div>
            <div class="controls">
                <input type="text" class="search-bar" id="searchInput" placeholder="Search questions..." onkeyup="searchQs()">
                            <button class="btn-theme" onclick="window.location.href='index.html'" style="margin-right: 10px;">🏠 Dashboard</button>

                <button class="btn" id="studyBtn" onclick="toggleStudyMode()">🧠 Study Mode: OFF</button>
                <button class="btn" onclick="revealAll()">👁️ Reveal All</button>
                <button class="btn" onclick="toggleTheme()" id="themeBtn">☀️ Light</button>
            </div>
        </div>

        <div class="qa-list" id="qaList">
            </div>
    </div>

    <script>
        // =================================================================================
        // THE 150 UNIQUE QUESTION DATABASE (PART 1: Q1 to Q50)
        // Every single option is explained. No duplicates.
        // =================================================================================
        const detailedDB = [
            // --- WEEK 1: FUNDAMENTALS (Q1 - Q12) ---
            {
                c: "Week 1",
                q: "According to Hollensen, what fundamentally defines International Marketing?",
                opts: [
                    { t: "The complete lack of competitors in foreign markets.", isCorrect: false, e: "❌ Incorrect. Foreign markets actually expose firms to more competition from entrenched local incumbents." },
                    { t: "A fundamental difference in the basic laws of economics.", isCorrect: false, e: "❌ Incorrect. The basic economic principles of supply and demand remain the same regardless of borders." },
                    { t: "Execution of one or more marketing mix decisions across national boundaries.", isCorrect: true, e: "✅ Correct. This cross-border execution introduces immense complexity regarding currencies, laws, and cultures." },
                    { t: "The requirement to always standardize the marketing mix.", isCorrect: false, e: "❌ Incorrect. International marketing often demands adaptation to survive local differences." }
                ]
            },
            {
                c: "Week 1",
                q: "Which statement best describes the strategic concept of 'Glocalization'?",
                opts: [
                    { t: "Applying the exact same marketing strategy worldwide to save money.", isCorrect: false, e: "❌ Incorrect. This defines pure 'Standardization' or an Ethnocentric approach." },
                    { t: "Building a brand new, unique product from scratch for every single country.", isCorrect: false, e: "❌ Incorrect. This defines extreme 'Adaptation', which destroys economies of scale." },
                    { t: "Balancing global economies of scale with local market responsiveness.", isCorrect: true, e: "✅ Correct. 'Think Global, Act Local'. It involves standardizing core components while adapting outer features to satisfy local tastes." },
                    { t: "Outsourcing all production to a single foreign country.", isCorrect: false, e: "❌ Incorrect. Outsourcing is a supply chain tactic, not a marketing strategy." }
                ]
            },
            {
                c: "Week 1",
                q: "In the EPRG Framework, what does an 'Ethnocentric' approach mean?",
                opts: [
                    { t: "Giving each host country a highly adapted, unique strategy.", isCorrect: false, e: "❌ Incorrect. That is the definition of a Polycentric approach." },
                    { t: "Applying the home-country standard to all foreign markets.", isCorrect: true, e: "✅ Correct. The firm assumes what works at home will automatically work abroad, often leading to failure." },
                    { t: "A world-oriented view targeting global segments.", isCorrect: false, e: "❌ Incorrect. That is the definition of a Geocentric approach." },
                    { t: "Entering markets solely based on low psychic distance.", isCorrect: false, e: "❌ Incorrect. That refers to the opportunistic market selection approach." }
                ]
            },
            {
                c: "Week 1",
                q: "What is the primary operational benefit of Product Standardization?",
                opts: [
                    { t: "Higher local market relevance.", isCorrect: false, e: "❌ Incorrect. Standardized products often lack relevance to specific local niches." },
                    { t: "Bypassing local import tariffs.", isCorrect: false, e: "❌ Incorrect. Tariffs are based on trade laws, not whether the product is standardized." },
                    { t: "Economies of scale in production and R&D.", isCorrect: true, e: "✅ Correct. Producing millions of identical units massively reduces the cost per unit." },
                    { t: "Ensuring compliance with all foreign electrical laws.", isCorrect: false, e: "❌ Incorrect. Standardized products usually fail foreign safety and electrical regulations." }
                ]
            },
            {
                c: "Week 1",
                q: "What is 'Modularization' in an international manufacturing context?",
                opts: [
                    { t: "Selling products in distinct, small geographic modules.", isCorrect: false, e: "❌ Incorrect. Modularization relates to product design, not geographic territories." },
                    { t: "Hiring temporary, modular staff for global expansions.", isCorrect: false, e: "❌ Incorrect. This relates to HR, not product strategy." },
                    { t: "Standardizing internal components while adapting external designs.", isCorrect: true, e: "✅ Correct. It allows a company (like Electrolux) to gain economies of scale on the 'guts' of a machine while customizing the outside." },
                    { t: "Using multiple advertising agencies for one campaign.", isCorrect: false, e: "❌ Incorrect. This relates to communication, not manufacturing." }
                ]
            },
            {
                c: "Week 1",
                q: "Why is 'Coordination' considered a major challenge in global marketing?",
                opts: [
                    { t: "It requires all employees to speak the same language.", isCorrect: false, e: "❌ Incorrect. Multinationals operate in multiple languages daily." },
                    { t: "Without it, multinational branches may end up competing against each other.", isCorrect: true, e: "✅ Correct. Without centralized coordination, a company's UK branch might cannibalize sales or contradict the marketing of its French branch." },
                    { t: "It is illegal under World Trade Organization rules.", isCorrect: false, e: "❌ Incorrect. The WTO does not regulate internal corporate coordination." },
                    { t: "It prevents the use of secondary market research.", isCorrect: false, e: "❌ Incorrect. Coordination has no bearing on gathering secondary data." }
                ]
            },
            {
                c: "Week 1",
                q: "In the EPRG Framework, what characterizes a 'Polycentric' firm?",
                opts: [
                    { t: "They assume their home culture is superior.", isCorrect: false, e: "❌ Incorrect. This is the definition of Ethnocentric." },
                    { t: "They look for global similarities across all borders.", isCorrect: false, e: "❌ Incorrect. This is the definition of Geocentric." },
                    { t: "They believe every foreign market is unique and grant local managers total autonomy.", isCorrect: true, e: "✅ Correct. Polycentric firms adapt to everything, which maximizes local relevance but sacrifices economies of scale." },
                    { t: "They only sell products digitally.", isCorrect: false, e: "❌ Incorrect. The EPRG framework applies to both physical and digital goods." }
                ]
            },
            {
                c: "Week 1",
                q: "What does 'Administrative Distance' refer to in international marketing?",
                opts: [
                    { t: "The physical miles between headquarters and a subsidiary.", isCorrect: false, e: "❌ Incorrect. That is Geographic Distance." },
                    { t: "The difference in cultural values between two nations.", isCorrect: false, e: "❌ Incorrect. That is Cultural or Psychic Distance." },
                    { t: "The level of bureaucracy, corruption, legal, and institutional differences between nations.", isCorrect: true, e: "✅ Correct. High administrative distance means dealing with vastly different red tape, taxes, and government structures." },
                    { t: "The cost difference in management salaries.", isCorrect: false, e: "❌ Incorrect. This relates to economic cost structures, not administrative frameworks." }
                ]
            },
            {
                c: "Week 1",
                q: "According to the Week 1 framework, which of the following is an 'uncontrollable' element for an international marketer?",
                opts: [
                    { t: "The physical product design.", isCorrect: false, e: "❌ Incorrect. The marketer controls the product design." },
                    { t: "The promotional budget.", isCorrect: false, e: "❌ Incorrect. The firm controls how much money it spends." },
                    { t: "The foreign political and legal environment.", isCorrect: true, e: "✅ Correct. Marketers cannot control foreign governments, tariffs, or laws; they can only adapt to them." },
                    { t: "The choice of distribution channel.", isCorrect: false, e: "❌ Incorrect. The firm chooses whether to use direct or indirect distribution." }
                ]
            },
            {
                c: "Week 1",
                q: "Which approach is most prone to the dangerous 'Self-Reference Criterion' bias?",
                opts: [
                    { t: "Geocentric.", isCorrect: false, e: "❌ Incorrect. Geocentric relies on global insights, not just home-country bias." },
                    { t: "Polycentric.", isCorrect: false, e: "❌ Incorrect. Polycentric relies on local managers, eliminating home-country bias." },
                    { t: "Ethnocentric.", isCorrect: true, e: "✅ Correct. Ethnocentric firms assume their home culture's way of doing things is universally applicable, causing disastrous blind spots." },
                    { t: "Regiocentric.", isCorrect: false, e: "❌ Incorrect. Regiocentric focuses on a specific region (like all of Europe), not just the home country." }
                ]
            },
            {
                c: "Week 1",
                q: "How does the physical 'Infrastructure' of a host country impact international marketing?",
                opts: [
                    { t: "It determines the local language spoken.", isCorrect: false, e: "❌ Incorrect. Language is a socio-cultural factor." },
                    { t: "It dictates physical distribution and communication capabilities.", isCorrect: true, e: "✅ Correct. A lack of paved roads, cold-chain storage, or internet access severely limits how a product can be delivered and advertised." },
                    { t: "It establishes the import tariff rate.", isCorrect: false, e: "❌ Incorrect. Tariffs are set by political treaties, not physical infrastructure." },
                    { t: "It prevents product standardization.", isCorrect: false, e: "❌ Incorrect. Poor infrastructure might affect distribution, but the product itself can still be standardized." }
                ]
            },
            {
                c: "Week 1",
                q: "What is the ultimate goal of an International Strategic Marketing Plan?",
                opts: [
                    { t: "To ensure prices are exactly the same in every country.", isCorrect: false, e: "❌ Incorrect. Varying local economies make identical pricing impossible." },
                    { t: "To eliminate all cultural differences globally.", isCorrect: false, e: "❌ Incorrect. Marketers cannot erase cultures; they navigate them." },
                    { t: "To create a sustainable competitive advantage across borders.", isCorrect: true, e: "✅ Correct. The goal is to navigate the global/local tension to outperform competitors and achieve long-term profitability." },
                    { t: "To rely solely on digital, borderless marketing.", isCorrect: false, e: "❌ Incorrect. Most products still require physical distribution strategies." }
                ]
            },

            // --- WEEK 2: ENVIRONMENT (Q13 - Q24) ---
            {
                c: "Week 2",
                q: "When a UK firm evaluates expanding to Brazil, they note that Brazil recently raised import tariffs by 15%. In a PESTEL analysis, this falls under:",
                opts: [
                    { t: "Technological", isCorrect: false, e: "❌ Incorrect. Tariffs have nothing to do with digital infrastructure, IP, or automation." },
                    { t: "Social", isCorrect: false, e: "❌ Incorrect. Social factors cover demographics, urbanization, and cultural trends." },
                    { t: "Political / Legal", isCorrect: true, e: "✅ Correct. Tariffs, trade embargoes, and taxation policies are actions taken by governments, falling squarely under Political and Legal constraints." },
                    { t: "Environmental", isCorrect: false, e: "❌ Incorrect. Environmental covers climate change, carbon taxes, and sustainability laws." }
                ]
            },
            {
                c: "Week 2",
                q: "In Porter's Five Forces, which scenario makes an industry HIGHLY attractive (profitable)?",
                opts: [
                    { t: "High Threat of Substitutes.", isCorrect: false, e: "❌ Incorrect. If consumers can easily find alternative ways to solve their problem, your pricing power drops." },
                    { t: "High Barriers to Entry.", isCorrect: true, e: "✅ Correct. High barriers (like strict patents or massive capital requirements) keep new competitors out, protecting the profits of the firms already inside." },
                    { t: "High Buyer Power.", isCorrect: false, e: "❌ Incorrect. If buyers have high power (e.g., Walmart buying in massive bulk), they will force you to lower your prices." },
                    { t: "Intense Competitive Rivalry.", isCorrect: false, e: "❌ Incorrect. Fierce rivalry means constant price wars and heavy marketing spend, which drains profits." }
                ]
            },
            {
                c: "Week 2",
                q: "Which PESTEL factor covers 'Currency Exchange Rates'?",
                opts: [
                    { t: "Political", isCorrect: false, e: "❌ Incorrect. While politics can influence rates, the rates themselves are economic metrics." },
                    { t: "Economic", isCorrect: true, e: "✅ Correct. Fluctuating exchange rates, inflation, and interest rates directly impact a firm's pricing strategy and profit margins." },
                    { t: "Social", isCorrect: false, e: "❌ Incorrect. Social deals with people and culture." },
                    { t: "Legal", isCorrect: false, e: "❌ Incorrect. Legal deals with legislation, not monetary value." }
                ]
            },
            {
                c: "Week 2",
                q: "What is the primary purpose of Porter's Diamond of National Advantage?",
                opts: [
                    { t: "To evaluate a single company's internal strengths.", isCorrect: false, e: "❌ Incorrect. That is what a SWOT analysis does." },
                    { t: "To assess the macro-environment of a target country.", isCorrect: false, e: "❌ Incorrect. That is what PESTEL does." },
                    { t: "To explain why certain countries dominate specific global industries.", isCorrect: true, e: "✅ Correct. It analyzes why nations like Germany excel at automotive engineering or Switzerland at watchmaking." },
                    { t: "To calculate international shipping costs.", isCorrect: false, e: "❌ Incorrect. Porter's Diamond has nothing to do with freight calculations." }
                ]
            },
            {
                c: "Week 2",
                q: "In Porter's Diamond, what are 'Demand Conditions'?",
                opts: [
                    { t: "The global demand for raw materials.", isCorrect: false, e: "❌ Incorrect. It focuses on the *domestic* market." },
                    { t: "The presence of highly sophisticated, demanding local consumers.", isCorrect: true, e: "✅ Correct. Demanding home buyers force local companies to innovate and improve quality, making them globally competitive." },
                    { t: "The government's demand for taxes.", isCorrect: false, e: "❌ Incorrect. Taxes belong under Factor Conditions or PESTEL." },
                    { t: "The lack of demand causing firms to export.", isCorrect: false, e: "❌ Incorrect. It refers to the *quality* of demand, not the lack thereof." }
                ]
            },
            {
                c: "Week 2",
                q: "In the Value Chain, is 'Inbound Logistics' a Primary or Support activity?",
                opts: [
                    { t: "Support Activity.", isCorrect: false, e: "❌ Incorrect. Support activities are HR, Tech Development, and Procurement." },
                    { t: "Primary Activity.", isCorrect: true, e: "✅ Correct. It directly involves the physical receiving, warehousing, and inventory control of raw materials needed to make the product." },
                    { t: "Secondary Activity.", isCorrect: false, e: "❌ Incorrect. The Value Chain uses the terms 'Primary' and 'Support'." },
                    { t: "Tertiary Activity.", isCorrect: false, e: "❌ Incorrect. This is not a Value Chain term." }
                ]
            },
            {
                c: "Week 2",
                q: "In Porter's 5 Forces, what is a 'Substitute'?",
                opts: [
                    { t: "A direct competitor selling the exact same item.", isCorrect: false, e: "❌ Incorrect. That is 'Competitive Rivalry'." },
                    { t: "A product from a completely different industry that solves the same customer problem.", isCorrect: true, e: "✅ Correct. For example, a video streaming service (Netflix) is a substitute for a physical movie theater." },
                    { t: "A cheaper raw material used in manufacturing.", isCorrect: false, e: "❌ Incorrect. That relates to Supplier Power." },
                    { t: "An alternative advertising channel.", isCorrect: false, e: "❌ Incorrect. Substitutes refer to the end product, not marketing channels." }
                ]
            },
            {
                c: "Week 2",
                q: "What does 'Expropriation' mean in a Political risk context?",

                    { t: "Product Standardization", isCorrect: false, e: "❌ Incorrect. They are actively changing the product, not standardizing it." },
                    { t: "Glocalization of Communication", isCorrect: false, e: "❌ Incorrect. This is a physical product change, not an advertising change." }
                ]
            },
            {
                c: "Week 4: Culture",
                q: "An advertisement showing a teenager rebelling against their parents to follow their own dreams would likely FAIL in a society that scores highly in:",
                opts: [
                    { t: "Masculinity", isCorrect: false, e: "❌ Incorrect. Masculine cultures often celebrate individual heroic achievements." },
                    { t: "Individualism", isCorrect: false, e: "❌ Incorrect. Individualistic cultures celebrate doing your own thing." },
                    { t: "Collectivism", isCorrect: true, e: "✅ Correct. Collectivist cultures value group harmony, family consensus, and respect for elders above individual rebellion." },
                    { t: "Low Power Distance", isCorrect: false, e: "❌ Incorrect. Low power distance cultures accept questioning authority." }
                ]
            },

            // --- DEEP DIVE: ENTRY MODES & PRICING (Q136 - Q145) ---
            {
                c: "Week 8: Pricing",
                q: "What is the strategic middle-ground between Ethnocentric pricing (one global price) and Polycentric pricing (total local control)?",
                opts: [
                    { t: "Transfer Pricing", isCorrect: false, e: "❌ Incorrect. Transfer pricing is for internal corporate transactions." },
                    { t: "Market Skimming", isCorrect: false, e: "❌ Incorrect. Skimming is a high-to-low timeline strategy." },
                    { t: "Geocentric Pricing", isCorrect: true, e: "✅ Correct. Geocentric pricing establishes a global baseline to protect the brand, but allows coordinated adjustments for local realities." },
                    { t: "Dumping", isCorrect: false, e: "❌ Incorrect. Dumping is an illegal predatory pricing strategy." }
                ]
            },
            {
                c: "Week 5: Entry Modes",
                q: "Two competing pharmaceutical giants decide to temporarily collaborate on a specific R&D project to cure a disease, without forming a new, separate company. This is a:",
                opts: [
                    { t: "Wholly Owned Subsidiary", isCorrect: false, e: "❌ Incorrect. That would mean one company owns the operation 100%." },
                    { t: "Joint Venture", isCorrect: false, e: "❌ Incorrect. A Joint Venture legally requires the creation of a brand new third company." },
                    { t: "Strategic Alliance", isCorrect: true, e: "✅ Correct. A Strategic Alliance is a contractual handshake to work together while remaining totally legally independent." },
                    { t: "Franchise", isCorrect: false, e: "❌ Incorrect. Franchising involves licensing a business model." }
                ]
            },
            {
                c: "Week 8: Pricing",
                q: "Why is 'Dumping' heavily penalized by the World Trade Organization (WTO)?",
                opts: [
                    { t: "Because it creates Grey Markets.", isCorrect: false, e: "❌ Incorrect. Grey markets are created by varying retail prices, not dumping." },
                    { t: "Because it involves selling goods below the cost of production in a foreign market to deliberately destroy local competitors.", isCorrect: true, e: "✅ Correct. It is a predatory monopoly tactic. Once the local firms go bankrupt, the dumping firm raises its prices." },
                    { t: "Because it violates environmental laws.", isCorrect: false, e: "❌ Incorrect. Dumping in marketing refers to prices, not physical waste." },
                    { t: "Because it increases Price Escalation.", isCorrect: false, e: "❌ Incorrect. Dumping artificially lowers prices." }
                ]
            },

            // --- FINAL RAPID FIRE & CASE RECAPS (Q146 - Q150) ---
            {
                c: "Case: Bosch",
                q: "When Bosch evaluated Middle Eastern markets, they scored the 'Market Attractiveness' against their 'Competitive Strength'. Which tool were they using?",
                opts: [
                    { t: "PESTEL", isCorrect: false, e: "❌ Incorrect. PESTEL only looks at external macro factors." },
                    { t: "Porter's 5 Forces", isCorrect: false, e: "❌ Incorrect. 5 Forces looks at industry rivalry." },
                    { t: "The MACS Matrix", isCorrect: true, e: "✅ Correct. The MACS Matrix specifically plots those two exact variables to filter expansion targets." },
                    { t: "The Value Chain", isCorrect: false, e: "❌ Incorrect. The Value Chain looks at internal operational steps." }
                ]
            },
            {
                c: "Week 7: Comms",
                q: "True or False: The 'Country of Origin' effect can only ever be positive (e.g., French Wine, German Cars). It never hurts a brand's image.",
                opts: [
                    { t: "True", isCorrect: false, e: "❌ Incorrect. Negative bias is very real." },
                    { t: "False", isCorrect: true, e: "✅ Correct. The COO effect can be highly negative if a country has a global reputation for poor quality, corruption, or unsafe manufacturing standards." },
                    { t: "Only true for services.", isCorrect: false, e: "❌ Incorrect. It affects both products and services." },
                    { t: "Only true in B2B markets.", isCorrect: false, e: "❌ Incorrect. It heavily affects B2C consumer choices." }
                ]
            },
            {
                c: "Deloitte Trends",
                q: "The Deloitte trend involving breaking down industry walls to create new ecosystems through cross-industry partnerships is called:",
                opts: [
                    { t: "Agility", isCorrect: false, e: "❌ Incorrect. Agility is about speed and flexibility." },
                    { t: "Participation", isCorrect: false, e: "❌ Incorrect. Participation is about letting customers co-create." },
                    { t: "Fusion", isCorrect: true, e: "✅ Correct. Fusion is about creating entirely new value by combining different industries (e.g., a bank partnering with a health-tracking app)." },
                    { t: "Trust", isCorrect: false, e: "❌ Incorrect. Trust is about empathy and competence." }
                ]
            },
            {
                c: "Week 9: Research",
                q: "In international market segmentation, what does 'Targeting' refer to?",
                opts: [
                    { t: "Dividing the market into distinct groups.", isCorrect: false, e: "❌ Incorrect. That is the definition of 'Segmentation'." },
                    { t: "Creating an image in the consumer's mind.", isCorrect: false, e: "❌ Incorrect. That is the definition of 'Positioning'." },
                    { t: "Selecting one or more of the identified segments to enter and focus resources on.", isCorrect: true, e: "✅ Correct. You Segment (divide), Target (choose the best one), and Position (create the image)." },
                    { t: "Choosing a physical retail location.", isCorrect: false, e: "❌ Incorrect. That is 'Place' in the 4Ps." }
                ]
            },
            {
                c: "Course Synthesis",
                q: "What is the ultimate key to mastering International Strategic Marketing?",
                opts: [
                    { t: "Memorizing terminology without context.", isCorrect: false, e: "❌ Incorrect. Theory without application fails in the real world." },
                    { t: "Assuming global standardization always wins.", isCorrect: false, e: "❌ Incorrect. Total standardization often alienates local cultures." },
                    { t: "Critically applying frameworks (PESTEL, Hofstede, MACS) to balance global efficiencies with local cultural realities.", isCorrect: true, e: "✅ Correct. Distinction-level mastery requires navigating the tension between global scale and local relevance using structured analysis." },
                    { t: "Relying entirely on the Self-Reference Criterion.", isCorrect: false, e: "❌ Incorrect. The SRC is the ultimate trap that destroys global campaigns." }
                ]
            }
        ];

        // --- ENGINE LOGIC ---
        function init() {
            renderCards(detailedDB);
        }

        function renderCards(data) {
            const container = document.getElementById('qaList');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 50px; font-size: 20px; color: var(--text-muted);">No questions found.</div>`;
                return;
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'qa-card';
                
                let html = `
                    <div class="qa-header">
                        <span class="qa-cat">${item.c}</span>
                        <span class="qa-num">Q ${index + 1}</span>
                    </div>
                    <div class="qa-q">${item.q}</div>
                    <button class="btn-reveal" onclick="this.parentElement.classList.add('revealed')">👁️ Reveal Explanations</button>
                    <div class="reveal-hint">Click card to reveal answers</div>
                    <div class="qa-options-container">
                `;

                const letters = ['A', 'B', 'C', 'D'];
                item.opts.forEach((opt, optIndex) => {
                    const statusClass = opt.isCorrect ? 'is-correct' : 'is-wrong';
                    html += `
                        <div class="opt-box ${statusClass}">
                            <div class="opt-header">
                                <div class="opt-letter">${letters[optIndex]}</div>
                                <div class="opt-text">${opt.t}</div>
                            </div>
                            <div class="opt-explanation">${opt.e}</div>
                        </div>
                    `;
                });

                html += `</div>`; 
                card.innerHTML = html;

                card.onclick = function(e) {
                    if (document.body.classList.contains('study-mode') && !e.target.classList.contains('btn-reveal')) {
                        this.classList.add('revealed');
                    }
                };

                container.appendChild(card);
            });

            document.getElementById('pageTitle').innerText = `${data.length} Questions Displayed`;
        }

        function filterCat(category, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('searchInput').value = '';

            if (category === 'All') renderCards(detailedDB);
            else renderCards(detailedDB.filter(q => q.c.includes(category)));

            if (window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('open');
            document.getElementById('mainWrapper').scrollTo(0,0);
        }

        function searchQs() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const filtered = detailedDB.filter(q => {
                if (q.q.toLowerCase().includes(term)) return true;
                for (let opt of q.opts) {
                    if (opt.t.toLowerCase().includes(term) || opt.e.toLowerCase().includes(term)) return true;
                }
                return false;
            });
            renderCards(filtered);
        }

        function revealAll() {
            document.body.classList.remove('study-mode');
            const btn = document.getElementById('studyBtn');
            if(btn) { btn.innerText = "🧠 Study Mode: OFF"; btn.classList.remove('btn-active'); }
            document.querySelectorAll('.qa-card').forEach(c => c.classList.add('revealed'));
        }

        function toggleStudyMode() {
            const body = document.body;
            const btn = document.getElementById('studyBtn');
            if (body.classList.contains('study-mode')) {
                body.classList.remove('study-mode');
                btn.innerText = "🧠 Study Mode: OFF"; btn.classList.remove('btn-active');
            } else {
                body.classList.add('study-mode');
                btn.innerText = "🧠 Study Mode: ON"; btn.classList.add('btn-active');
                document.querySelectorAll('.qa-card').forEach(c => c.classList.remove('revealed'));
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light'); btn.innerText = '🌙 Light';
            } else {
                html.setAttribute('data-theme', 'dark'); btn.innerText = '☀️ Dark';
            }
        }

        window.onload = init;
    </script>
</body>
